<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="50%" stop-color="#2D00F7" />
      <stop offset="100%" stop-color="#B200FF" />
    </linearGradient>
    <linearGradient id="wingGradL" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(178, 0, 255, 0.2)" />
      <stop offset="100%" stop-color="rgba(0, 245, 255, 0.7)" />
    </linearGradient>
    <linearGradient id="wingGradR" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(178, 0, 255, 0.2)" />
      <stop offset="100%" stop-color="rgba(0, 245, 255, 0.7)" />
    </linearGradient>
  </defs>

  <g transform="translate(100, 100)">
    <!-- Wings Left -->
    <path d="M -10 -20 C -60 -80 -80 -20 -15 -5" fill="url(#wingGradL)" stroke="#00F5FF" stroke-width="2"/>
    <path d="M -5 0 C -40 -30 -60 20 -10 10" fill="none" stroke="#B200FF" stroke-width="2"/>
    
    <!-- Wings Right -->
    <path d="M 10 -20 C 60 -80 80 -20 15 -5" fill="url(#wingGradR)" stroke="#00F5FF" stroke-width="2"/>
    <path d="M 5 0 C 40 -30 60 20 10 10" fill="none" stroke="#B200FF" stroke-width="2"/>
    
    <!-- Body Capsule -->
    <rect x="-16" y="-35" width="32" height="75" rx="16" fill="#0A0A1A" stroke="url(#neonGlow)" stroke-width="4"/>
    
    <!-- Glowing Stripes -->
    <path d="M -16 -5 Q 0 0 16 -5" fill="none" stroke="#00F5FF" stroke-width="4" stroke-linecap="round"/>
    <path d="M -16 10 Q 0 15 16 10" fill="none" stroke="#2D00F7" stroke-width="4" stroke-linecap="round"/>
    <path d="M -14 25 Q 0 30 14 25" fill="none" stroke="#B200FF" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Head -->
    <circle cx="0" cy="-35" r="12" fill="#0A0A1A" stroke="#00F5FF" stroke-width="3"/>
    
    <!-- Antennae -->
    <path d="M -6 -45 Q -15 -60 -25 -55" fill="none" stroke="#00F5FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 6 -45 Q 15 -60 25 -55" fill="none" stroke="#B200FF" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Stinger -->
    <path d="M -4 40 L 0 55 L 4 40 Z" fill="#00F5FF" />
  </g>
</svg>
